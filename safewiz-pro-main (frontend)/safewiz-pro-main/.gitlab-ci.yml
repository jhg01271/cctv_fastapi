# To contribute improvements to CI/CD templates, please follow the Development guide at:
# https://docs.gitlab.com/ee/development/cicd/templates.html
# This specific template is located at:
# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Getting-Started.gitlab-ci.yml

# This is a sample GitLab CI/CD configuration file that should run without any modifications.
# It demonstrates a basic 3 stage CI/CD pipeline. Instead of real tests or scripts,
# it uses echo commands to simulate the pipeline execution.
#
# A pipeline is composed of independent jobs that run scripts, grouped into stages.
# Stages run in sequential order, but jobs within stages run in parallel.
#
# For more information, see: https://docs.gitlab.com/ee/ci/yaml/index.html#stages

stages: # 명시된 stage순서대로 동작
    - build
    - deploy

build-job: # pipeline job name
    stage: build # job의 stage
    image: node:20-alpine # 사용할 docker image
    script: # 동작시킬 스크립트 정의
        #    - env
        - chmod -R 755 ./*
        - rm -rf node_modules/
        - npm cache clean --force
        - npm install
        - npm run build
    artifacts: # build잡에서 생성된 폴더를 gitlab에 저장하고 다음 단계의 pipeLine에서 사용할 수 있도록 함
        expire_in: 1 hour # gitlab에 저장할 기간 정의
        paths:
            - dist/*
    tags:
        - esg # git-runner의 tag명
    #when: manual  ## job 을 웹에서 수동으로 실행
    only:
        - main

deploy-dev:
    stage: deploy
    before_script: # 정의된 script를 실행하기전 실행할 script
        ## Install ssh-agent if not already installed, it is required by Docker.
        #- 'command -v ssh-agent >/dev/null || ( apk add --update openssh )'
        - 'command -v ssh-agent >/dev/null || ( apt-get update -y && apt-get install openssh-client -y )'
        ## Run ssh-agent (inside the build environment)
        - eval $(ssh-agent -s)
        - echo "$DEV_SSH_KEY" | tr -d '\r' | ssh-add -
        ## Create the SSH directory and give it the right permission
        - mkdir -p ~/.ssh
        - echo -e "$DEV_SSH_KEY" > ~/.ssh/id_rsa
        - chmod 700 ~/.ssh
        # private key 확인인
        - ssh-keyscan -p $SSH_PORT $DEV_ADDRESS >> ~/.ssh/id_rsa
        - chmod 644 ~/.ssh/id_rsa
    script:
        - echo "HOST *" > ~/.ssh/config
        - echo "StrictHostKeyChecking no" >> ~/.ssh/config

        - ssh $DEV_USER@$DEV_ADDRESS pwd
        # 기존 빌드 파일 압축 및 백업
        - ssh $DEV_USER@$DEV_ADDRESS rm -r dockerdata/framework/safewizpro/backup/frontend/*
        - ssh $DEV_USER@$DEV_ADDRESS zip dockerdata/framework/safewizpro/backup/frontend/front_end_backup$(date '+_%Y%m%d%H%M').zip -r dockerdata/framework/safewizpro/frontend/*
        # 기존 빌드 폴더 및 파일 삭제
        - ssh $DEV_USER@$DEV_ADDRESS rm -r dockerdata/framework/safewizpro/frontend/*
        # 빌드된 파일을 서버의 위치에 복사
        - scp -r dist/* $DEV_USER@$DEV_ADDRESS:dockerdata/framework/safewizpro/frontend/
        # container restart
        - ssh $DEV_USER@$DEV_ADDRESS docker restart frontend_safewizpro
    dependencies:
        - build-job # build-job에서 등록된 artifact를 가져온다.
    tags:
        - esg
    when: manual
    only:
        - main # 명시된 브랜치들이 커밋될때만 deploy-dev job이 동작하게 한다.

deploy-prod:
    stage: deploy
    before_script: # 정의된 script를 실행하기전 실행할 script
        ## Install ssh-agent if not already installed, it is required by Docker.
        #- 'command -v ssh-agent >/dev/null || ( apk add --update openssh )'
        - 'command -v ssh-agent >/dev/null || ( apt-get update -y && apt-get install openssh-client -y )'
        ## Run ssh-agent (inside the build environment)
        - eval $(ssh-agent -s)
        - echo "$PROD_SSH_KEY" | tr -d '\r' | ssh-add -
        ## Create the SSH directory and give it the right permission
        - mkdir -p ~/.ssh
        - echo -e "$PROD_SSH_KEY" > ~/.ssh/id_rsa
        - chmod 700 ~/.ssh
        # private key 확인
        - ssh-keyscan -p $SSH_PORT $PROD_ADDRESS >> ~/.ssh/id_rsa
        - chmod 644 ~/.ssh/id_rsa
    script:
        - echo "HOST *" > ~/.ssh/config
        - echo "StrictHostKeyChecking no" >> ~/.ssh/config

        - ssh $PROD_USER@$PROD_ADDRESS pwd
        # 기존 빌드 파일 압축 및 백업
        - ssh $PROD_USER@$PROD_ADDRESS rm -r dockerdata/framework/safewizpro/backup/frontend/*
        - ssh $PROD_USER@$PROD_ADDRESS zip dockerdata/framework/safewizpro/backup/frontend/front_end_backup$(date '+_%Y%m%d%H%M').zip -r dockerdata/framework/safewizpro/frontend/*
        # 기존 빌드 폴더 및 파일 삭제
        - ssh $PROD_USER@$PROD_ADDRESS rm -r dockerdata/framework/safewizpro/frontend/*
        # 빌드된 파일을 서버의 위치에 복사
        - scp -r dist/* $PROD_USER@$PROD_ADDRESS:dockerdata/framework/safewizpro/frontend/
        # container restart
        - ssh $PROD_USER@$PROD_ADDRESS docker restart frontend_safewizpro
    dependencies:
        - build-job # build-job에서 등록된 artifact를 가져온다.
    tags:
        - esg
    when: manual
    only:
        - main # 명시된 브랜치들이 커밋될때만 deploy-dev job이 동작하게 한다.
