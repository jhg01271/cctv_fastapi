version: '2.2'
x-logging:
   &default-logging
   driver: json-file
   options:
     max-size: "3m"
     max-file: "5"

services:
  nginx:
    container_name: nginx
    image: nginx:stable
    restart: always  # ← 요 부분!
    environment:
      TZ: "Asia/Seoul"
    networks:
      - iljoo
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-433}:433"
      - "${NGINX_ALT_PORT:-81}:81"
    volumes:
      - ./volume/nginx/conf.d:/etc/nginx/conf.d
      - ./volume/nginx/certs:/etc/nginx/certs
      - ./volume/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./volume/files:/files

  postgres:
    container_name: postgres
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_PASSWORD: "!Gns@jeonjin"
      TZ: "Asia/Seoul"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - iljoo
    ports:
      - "${PG_PORT:-5432}:5432"
    logging : *default-logging
    restart : always

  frontend:
    container_name: frontend
    image: httpd:2.4
    networks:
      - iljoo
    volumes:
      - ./volume/frontend/dist:/usr/local/apache2/htdocs
    logging: *default-logging
    restart: always

  backend:
    container_name: backend
    build:
      context: .
      dockerfile: backend.Dockerfile
    environment:
      TZ: "Asia/Seoul"
    command:
      - --spring.datasource.hikari.first.jdbc-url=jdbc:log4jdbc:postgresql://postgres:5432/postgres
      #      - --spring.datasource.hikari.first.jdbc-url=jdbc:log4jdbc:postgresql://192.168.0.42:5432/postgres
      - --spring.datasource.hikari.first.username=postgres
      - --spring.datasource.hikari.first.password=!Gns@jeonjin
      - --server.port=80
    networks:
      - iljoo
    ports:
      - "9011:80"
    volumes:
      - ./volume/backend:/tmp
      - ./volume/backend/log:/log/
      - ./volume/asset:/file
    logging: *default-logging
    restart: always

