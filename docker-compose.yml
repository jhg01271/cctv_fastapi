  mediamtx:
    container_name: mediamtx
    image: bluenviron/mediamtx:latest
    environment:
      TZ: "Asia/Seoul"
    networks:
      - iljoo
    ports:
      - "8554:8554"
      - "8889:8889"
      - "8189:8189/udp"
      - "9997:9997"
    volumes:
      - ./volume/ai_server/mediamtx.yml:/mediamtx.yml
    restart: always
    logging: *default-logging

  stream_gateway:
    container_name: stream_gateway
    build:
      context: ./volume/ai_server
      dockerfile: Dockerfile
    command:
      - uvicorn
      - service.stream_gateway.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8010"
    environment:
      TZ: "Asia/Seoul"
      APP_ENV: prod
      MEDIA_SERVER_HOST: mediamtx
    env_file:
      - ./volume/ai_server/config/.env.prod
    networks:
      - iljoo
    ports:
      - "8010:8010"
    depends_on:
      - mediamtx
    restart: always
    logging: *default-logging

  ai_server:
    container_name: ai_server
    build:
      context: ./volume/ai_server
      dockerfile: Dockerfile
    environment:
      TZ: "Asia/Seoul"
      APP_ENV: prod
      DB_HOST: postgres
      MEDIA_SERVER_HOST: mediamtx
      STREAM_GATEWAY_URL: http://stream_gateway:8010
    env_file:
      - ./volume/ai_server/config/.env.prod
    networks:
      - iljoo
    ports:
      - "8000:8000"
    volumes:
      - ./volume/ai_server/model:/app/model
    depends_on:
      - postgres
      - mediamtx
      - stream_gateway
    restart: always
    logging: *default-logging
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  pgdata:

networks:
  iljoo:
