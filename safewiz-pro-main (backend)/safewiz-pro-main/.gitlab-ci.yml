# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Getting-Started.gitlab-ci.yml

# This is a sample GitLab CI/CD configuration file that should run without any modifications.
# It demonstrates a basic 3 stage CI/CD pipeline. Instead of real tests or scripts,
# it uses echo commands to simulate the pipeline execution.
#
# A pipeline is composed of independent jobs that run scripts, grouped into stages.
# Stages run in sequential order, but jobs within stages run in parallel.
#
# For more information, see: https://docs.gitlab.com/ee/ci/yaml/index.html#stages
# written by LYJ 2023.12.08 

stages:          # List of stages for jobs, and their order of execution
  - build
  - deploy

build-job:  # This job runs in the build stage, which runs first.
  image: gradle:7.4.0-jdk11 #gradle:7.6-jdk17-alpine
  stage: build
  before_script:
    - export GRADLE_USER_HOME=`pwd`/.gradle
  script:
    - echo "Compiling the code..."
    - echo "Compile complete."
    - gradle bootJar
    - echo "build gradle"
    - cd build/libs
    - mv sp_backend-0.0.1-SNAPSHOT.jar i-back-end.jar
    - ls
  
  artifacts:
    expire_in: 1 hour
    paths:
        - build/libs/i-back-end.jar
  tags:
    - esg
  #when: manual  ## job 을 웹에서 수동으로 실행
  only:
    - main

deploy-dev:
  stage: deploy
  variables:
    PROFILE: dev
  before_script:
    ## Install ssh-agent if not already installed, it is required by Docker.
    #- 'command -v ssh-agent >/dev/null || ( apk add --update openssh )' 
    - 'command -v ssh-agent >/dev/null || ( apt-get update -y && apt-get install openssh-client -y )'
    ## Run ssh-agent (inside the build environment)
    - eval $(ssh-agent -s)
    - echo "$DEV_SSH_KEY" | tr -d '\r' | ssh-add -
    ## Create the SSH directory and give it the right permission
    - mkdir -p ~/.ssh
    - echo -e "$DEV_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 700 ~/.ssh
    # private key 확인인
    - ssh-keyscan -p $SSH_PORT $DEV_ADDRESS >> ~/.ssh/id_rsa
    - chmod 644 ~/.ssh/id_rsa
  script:
    # build jar 파일 위치
    - cd build/libs
    - ls
    # 기존 빌드 파일 백업
    - echo "$DEV_ADDRESS"
    - echo "$DEV_USER"
    - echo "HOST *" > ~/.ssh/config
    - echo "StrictHostKeyChecking no" >> ~/.ssh/config
    #
    - ssh $DEV_USER@$DEV_ADDRESS pwd
    - ssh $DEV_USER@$DEV_ADDRESS rm -r dockerdata/framework/safewizpro/backup/backend/*
    - ssh $DEV_USER@$DEV_ADDRESS cp dockerdata/framework/safewizpro/backend/i-back-end.jar dockerdata/framework/safewizpro/backup/backend/i-back-end$(date '+_%Y%m%d%H%M').jar
    
    - scp i-back-end.jar $DEV_USER@$DEV_ADDRESS:dockerdata/framework/safewizpro/backend/i-back-end.jar
    - ssh $DEV_USER@$DEV_ADDRESS docker restart backend_safewizpro
  dependencies:
    - build-job
  tags:
    - esg
  when: manual  ## job 을 웹에서 수동으로 실행
  only:
    - main
deploy-prod:
  stage: deploy
  variables:
    PROFILE: prod
  before_script:
    ## Install ssh-agent if not already installed, it is required by Docker.
    #- 'command -v ssh-agent >/dev/null || ( apk add --update openssh )'
    - 'command -v ssh-agent >/dev/null || ( apt-get update -y && apt-get install openssh-client -y )'
    ## Run ssh-agent (inside the build environment)
    - eval $(ssh-agent -s)
    - echo "$PROD_SSH_KEY" | tr -d '\r' | ssh-add -
    ## Create the SSH directory and give it the right permission
    - mkdir -p ~/.ssh
    - echo -e "$PROD_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 700 ~/.ssh
    # private key 확인인
    - ssh-keyscan -p $SSH_PORT $PROD_ADDRESS >> ~/.ssh/id_rsa
    - chmod 644 ~/.ssh/id_rsa
  script:
    # build jar 파일 위치
    - cd build/libs
    - ls
    # 기존 빌드 파일 백업
    - echo "$PROD_ADDRESS"
    - echo "$PROD_USER"
    - echo "HOST *" > ~/.ssh/config
    - echo "StrictHostKeyChecking no" >> ~/.ssh/config
    #
    - ssh $PROD_USER@$PROD_ADDRESS pwd
    - ssh $PROD_USER@$PROD_ADDRESS rm -r dockerdata/framework/safewizpro/backup/backend/*
    - ssh $PROD_USER@$PROD_ADDRESS cp dockerdata/framework/safewizpro/backend/i-back-end.jar dockerdata/framework/safewizpro/backup/backend/i-back-end$(date '+_%Y%m%d%H%M').jar

    - scp i-back-end.jar $PROD_USER@$PROD_ADDRESS:dockerdata/framework/safewizpro/backend/i-back-end.jar
    - ssh $PROD_USER@$PROD_ADDRESS docker restart backend_safewizpro
  dependencies:
    - build-job
  tags:
    - esg
  when: manual  ## job 을 웹에서 수동으로 실행
  only:
    - main