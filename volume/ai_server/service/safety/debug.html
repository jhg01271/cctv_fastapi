<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Safety Real-time Debugger</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f172a;
            --bg-surface: #1e293b;
            --bg-accent: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-indicator {
            width: 12px;
            height: 12px;
            background-color: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .header-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 16px;
        }

        .header-meta span {
            background: var(--bg-accent);
            padding: 4px 10px;
            border-radius: 6px;
            font-family: 'Fira Code', monospace;
        }

        /* Main Workspace */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
            overflow: hidden;
        }

        /* Sidebar - Camera Selector */
        .sidebar {
            width: 260px;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .camera-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .camera-btn {
            background-color: var(--bg-accent);
            border: 1px solid transparent;
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .camera-btn:hover {
            background-color: var(--border);
        }

        .camera-btn.active {
            background-color: var(--primary);
            border-color: var(--primary-hover);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .camera-badge {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-family: 'Fira Code', monospace;
        }

        /* Video Area (Center) */
        .video-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #020617;
            position: relative;
            padding: 20px;
            justify-content: center;
            align-items: center;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-stream-iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .bbox-canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            pointer-events: none; /* 클릭 이벤트 통과 */
        }

        .stream-controls {
            position: absolute;
            top: 35px;
            right: 35px;
            z-index: 3;
            display: flex;
            gap: 8px;
        }

        .control-btn {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(4px);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background: var(--bg-accent);
        }

        /* Right Panel - Terminal Log */
        .terminal-panel {
            width: 380px;
            background-color: #0b0f19;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-header {
            background-color: var(--bg-surface);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .terminal-title {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .terminal-dot {
            width: 8px;
            height: 8px;
            background-color: var(--danger);
            border-radius: 50%;
            display: inline-block;
        }

        .terminal-dot.connected {
            background-color: var(--success);
        }

        .terminal-body {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .log-line {
            word-break: break-all;
            white-space: pre-wrap;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            padding-bottom: 4px;
        }

        .log-time {
            color: var(--text-muted);
        }

        .log-info {
            color: #38bdf8;
        }

        .log-warn {
            color: var(--warning);
            font-weight: bold;
        }

        .log-error {
            color: var(--danger);
            font-weight: bold;
        }

        .log-detection {
            color: #a7f3d0;
        }

        .log-event {
            color: #f43f5e;
            background-color: rgba(244, 63, 94, 0.1);
            padding: 2px 4px;
            border-radius: 4px;
            display: block;
        }

        .clear-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .clear-btn:hover {
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.6;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <div class="logo-indicator"></div>
            <h1>AI Safety Real-time Debugger</h1>
        </div>
        <div class="header-meta">
            <div>WS Status: <span id="conn-state">Disconnected</span></div>
            <div>Active Cam: <span id="active-cam-id">None</span></div>
        </div>
    </header>

    <div class="workspace">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2 class="section-title">카메라 선택</h2>
            <div class="camera-list" id="camera-list-container">
                <!-- Javascript가 동적으로 카메라 로드 -->
                <button class="camera-btn" onclick="switchCamera('CAM0001')">CAM0001 <span class="camera-badge">CCT1</span></button>
                <button class="camera-btn" onclick="switchCamera('CAM0002')">CAM0002 <span class="camera-badge">CCT2</span></button>
                <button class="camera-btn" onclick="switchCamera('CAM0003')">CAM0003 <span class="camera-badge">CCT3</span></button>
                <button class="camera-btn" onclick="switchCamera('CAM0004')">CAM0004 <span class="camera-badge">CCT4</span></button>
                <button class="camera-btn" onclick="switchCamera('CAM0005')">CAM0005 <span class="camera-badge">CCT5</span></button>
                <button class="camera-btn" onclick="switchCamera('CAM0006')">CAM0006 <span class="camera-badge">CCT6</span></button>
            </div>
        </div>

        <!-- Video Area -->
        <div class="video-container">
            <div class="video-wrapper" id="video-wrapper">
                <iframe class="video-stream-iframe" id="video-iframe" src=""></iframe>
                <canvas class="bbox-canvas" id="bbox-canvas"></canvas>
            </div>
            
            <div class="stream-controls">
                <button class="control-btn" onclick="reconnectWebSocket()">WS 재연결</button>
                <button class="control-btn" onclick="reloadStream()">비디오 갱신</button>
            </div>
        </div>

        <!-- Terminal Logs -->
        <div class="terminal-panel">
            <div class="terminal-header">
                <div class="terminal-title">
                    <span class="terminal-dot" id="terminal-status-dot"></span>
                    <span>console_log.sh</span>
                </div>
                <button class="clear-btn" onclick="clearLogs()">Clear</button>
            </div>
            <div class="terminal-body" id="terminal-logs">
                <div class="log-line"><span class="log-time">[14:30:00]</span> <span class="log-info">Debugger initialized. 카메라인덱스를 선택해주세요.</span></div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let activeCameraId = '';
        const canvas = document.getElementById('bbox-canvas');
        const ctx = canvas.getContext('2d');
        const videoWrapper = document.getElementById('video-wrapper');
        const terminalLogs = document.getElementById('terminal-logs');
        const connStateText = document.getElementById('conn-state');
        const activeCamText = document.getElementById('active-cam-id');
        const terminalStatusDot = document.getElementById('terminal-status-dot');

        // AI bbox 좌표는 서버가 읽은 영상 프레임 크기 기준이다.
        // 서버가 frame_width/frame_height를 아직 보내지 않는 경우에만 1280x720을 기본값으로 사용한다.
        const FALLBACK_AI_RESOLUTION = { width: 1280, height: 720 };
        let latestFrameSize = { ...FALLBACK_AI_RESOLUTION };
        let lastEmptyLogAt = 0;
        let lastFrameInfoLogAt = 0;
        let lastNoKeypointsLogAt = 0;
        const POSE_CLASSES = new Set(['standing', 'collapse', 'falldown']);

        // 클래스별 컬러 정의 (어두운 화면에서도 식별이 잘 가도록 형광/Cyan 계열 적용)
        const CLASS_COLORS = {
            'person': '#00ffff',     // Cyan (밝은 하늘색 - 어두운 화면에서 눈에 확 띔)
            'helmet': '#39ff14',     // Neon Green (밝은 연두색)
            'no_helmet': '#ff9f1c',  // Neon Orange (밝은 오렌지)
            'collapse': '#ef4444',   // Red
            'falldown': '#ef4444',   // Red
            'standing': '#3b82f6',   // Blue
            'forklift': '#e0aaff',   // Light Purple
            'hoist': '#ff758f',      // Light Pink
            'collision': '#ff007f',  // Bright Rose
        };

        // COCO 17-keypoint skeleton 연결 순서.
        // 서버가 detections[].keypoints를 내려줄 때만 화면에 선과 점을 그린다.
        const SKELETON_EDGES = [
            [5, 7], [7, 9],      // left arm
            [6, 8], [8, 10],     // right arm
            [5, 6],              // shoulders
            [5, 11], [6, 12],    // torso
            [11, 12],            // hips
            [11, 13], [13, 15],  // left leg
            [12, 14], [14, 16],  // right leg
            [0, 1], [0, 2], [1, 3], [2, 4], // face
        ];

        // 로드 시 초기 작업
        window.addEventListener('load', () => {
            adjustCanvasSize();
            // 기본 카메라 로드
            switchCamera('CAM0001');
        });

        // 윈도우 크기 변경 대응
        window.addEventListener('resize', () => {
            adjustCanvasSize();
        });

        function adjustCanvasSize() {
            // wrapper의 실제 화면 크기를 구하고 canvas에 반영
            const rect = videoWrapper.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
            
            // canvas 스타일 크기는 wrapper와 동일하게 맞춤
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
        }

        function switchCamera(cameraId) {
            if (activeCameraId === cameraId) return;

            activeCameraId = cameraId;
            activeCamText.innerText = cameraId;
            
            // 1. 버튼 액티브 스타일 처리
            const buttons = document.querySelectorAll('.camera-btn');
            buttons.forEach(btn => {
                if (btn.innerText.includes(cameraId)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            writeLog(`카메라 스위칭: ${cameraId}`, 'info');

            // 2. 비디오 재생 URL 지정
            // Nginx same-origin 프록시를 통해 MediaMTX 원본 경로를 그대로 로드합니다.
            const streamUrl = `/${cameraId}/?controls=0`;
            
            document.getElementById('video-iframe').src = streamUrl;
            writeLog(`재생 스트림 로드: ${streamUrl}`, 'info');

            // 3. 웹소켓 재설정
            connectWebSocket(cameraId);
        }

        function reloadStream() {
            const iframe = document.getElementById('video-iframe');
            const currentSrc = iframe.src;
            iframe.src = '';
            setTimeout(() => {
                iframe.src = currentSrc;
                writeLog(`비디오 스트림 새로고침 완료`, 'info');
            }, 100);
        }

        function connectWebSocket(cameraId) {
            if (ws) {
                ws.close();
            }

            // AI 서버가 구동 중인 포트(8000) 또는 Nginx 프록시(/safety)를 통해 연결
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            // routes.py의 router.websocket("/ws/{camera_id}") 매칭
            const wsUrl = `${protocol}//${window.location.host}/safety/ws/${cameraId}`;

            writeLog(`WebSocket 연결 시도: ${wsUrl}`, 'info');
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    connStateText.innerText = 'Connected';
                    connStateText.style.color = 'var(--success)';
                    terminalStatusDot.classList.add('connected');
                    writeLog(`WebSocket 연결 성공 [${cameraId}]`, 'info');
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handleAiData(data);
                    } catch (e) {
                        writeLog(`데이터 파싱 오류: ${e.message}`, 'error');
                    }
                };

                ws.onerror = (err) => {
                    writeLog(`WebSocket 오류 발생`, 'error');
                };

                ws.onclose = () => {
                    connStateText.innerText = 'Disconnected';
                    connStateText.style.color = 'var(--danger)';
                    terminalStatusDot.classList.remove('connected');
                    writeLog(`WebSocket 연결 종료`, 'warn');
                    // 감지 박스 잔상 제거
                    clearCanvas();
                };
            } catch (err) {
                writeLog(`WebSocket 초기화 실패: ${err.message}`, 'error');
            }
        }

        function reconnectWebSocket() {
            if (activeCameraId) {
                connectWebSocket(activeCameraId);
            }
        }

        function handleAiData(data) {
            if (data.camera_id && data.camera_id !== activeCameraId) {
                return;
            }

            clearCanvas();
            
            const detections = data.detections || [];
            const events = data.events || [];
            const frameWidth = Number(data.frame_width || data.frameWidth || latestFrameSize.width || FALLBACK_AI_RESOLUTION.width);
            const frameHeight = Number(data.frame_height || data.frameHeight || latestFrameSize.height || FALLBACK_AI_RESOLUTION.height);
            if (frameWidth > 0 && frameHeight > 0) {
                latestFrameSize = { width: frameWidth, height: frameHeight };
            }

            // 1. 이벤트 수신 시 로그 남김
            events.forEach(evt => {
                writeLog(`[EVENT FIRED] ${evt.type}: ${evt.message}`, 'event');
            });

            const now = Date.now();
            if (now - lastFrameInfoLogAt > 15000) {
                writeLog(`AI frame: ${latestFrameSize.width}x${latestFrameSize.height}`, 'info');
                lastFrameInfoLogAt = now;
            }

            if (detections.length === 0) {
                if (now - lastEmptyLogAt > 5000) {
                    writeLog(`AI running: no detections`, 'info');
                    lastEmptyLogAt = now;
                }
                return;
            }

            // 2. 디텍션 로그 터미널 인쇄
            const hasKeypoints = detections.some(d => Array.isArray(d.keypoints) && d.keypoints.length > 0);
            const hasPoseClass = detections.some(d => ['standing', 'collapse', 'falldown'].includes((d.class || '').toLowerCase()));
            if (hasPoseClass && !hasKeypoints && now - lastNoKeypointsLogAt > 10000) {
                writeLog(`Pose keypoints not provided by current model output`, 'warn');
                lastNoKeypointsLogAt = now;
            }

            const detSummary = detections.map(d => {
                const keypointCount = Array.isArray(d.keypoints) ? d.keypoints.length : 0;
                const suffix = keypointCount > 0 ? `+kp${keypointCount}` : '';
                return `${d.class}${suffix}(${Math.round(d.conf * 100)}%)`;
            }).join(', ');
            writeLog(`Detections: ${detSummary}`, 'detection');

            // 3. Canvas에 바운딩 박스 오버레이
            // 캔버스의 실제 표시 크기(CSS 픽셀 단위)를 구합니다.
            const rect = canvas.getBoundingClientRect();
            const canvasWidth = rect.width;
            const canvasHeight = rect.height;

            // AI 원본 프레임 좌표를 현재 화면 좌표로 변환한다.
            const scaleX = canvasWidth / latestFrameSize.width;
            const scaleY = canvasHeight / latestFrameSize.height;

            const drawableDetections = suppressPersonBoxesForCascadePose(detections);

            drawableDetections.forEach(det => {
                const bbox = det.bbox; // [x1, y1, x2, y2]
                if (!bbox || bbox.length < 4) return;

                const x1 = bbox[0] * scaleX;
                const y1 = bbox[1] * scaleY;
                const x2 = bbox[2] * scaleX;
                const y2 = bbox[3] * scaleY;
                const width = x2 - x1;
                const height = y2 - y1;

                // 대소문자 매칭 이슈 방지를 위해 소문자로 통일
                const className = (det.class || '').toLowerCase();
                const conf = det.conf;
                const color = CLASS_COLORS[className] || '#00ff00'; // 매칭 안 될 경우 가장 식별하기 편한 형광 연두색

                drawSkeleton(det.keypoints, scaleX, scaleY, color);

                // 박스 그리기
                ctx.strokeStyle = color;
                ctx.lineWidth = className === 'collapse' || className === 'falldown' || className === 'collision' ? 4 : 2;
                ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.shadowBlur = 4;
                ctx.strokeRect(x1, y1, width, height);
                ctx.shadowBlur = 0; // 그림자 초기화

                // 라벨 백그라운드 그리기
                const label = `${className} ${Math.round(conf * 100)}%`;
                ctx.font = 'bold 11px Inter, sans-serif';
                const textWidth = ctx.measureText(label).width;

                ctx.fillStyle = color;
                ctx.fillRect(x1 - 1, y1 - 18, textWidth + 10, 18);

                // 라벨 텍스트 그리기 (어두운 배경의 라벨 칩 내부 텍스트는 가독성을 위해 흰색 또는 검은색 분기)
                ctx.fillStyle = className === 'person' || className === 'helmet' ? '#000000' : '#ffffff';
                ctx.fillText(label, x1 + 4, y1 - 5);

                // 만약 collapse 혹은 collision 이면 점멸형 오버레이 추가 효과
                if (className === 'collapse' || className === 'falldown' || className === 'collision') {
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.1)';
                    ctx.fillRect(x1, y1, width, height);
                }
            });
        }

        function suppressPersonBoxesForCascadePose(detections) {
            const poseBoxes = detections
                .filter(d => POSE_CLASSES.has((d.class || '').toLowerCase()) && Array.isArray(d.bbox) && d.bbox.length >= 4)
                .map(d => d.bbox);

            if (poseBoxes.length === 0) {
                return detections;
            }

            return detections.filter(det => {
                const className = (det.class || '').toLowerCase();
                if (className !== 'person' || !Array.isArray(det.bbox) || det.bbox.length < 4) {
                    return true;
                }
                return !poseBoxes.some(poseBox => bboxIoU(det.bbox, poseBox) > 0.25);
            });
        }

        function bboxIoU(a, b) {
            const x1 = Math.max(a[0], b[0]);
            const y1 = Math.max(a[1], b[1]);
            const x2 = Math.min(a[2], b[2]);
            const y2 = Math.min(a[3], b[3]);
            const inter = Math.max(0, x2 - x1) * Math.max(0, y2 - y1);
            const areaA = Math.max(0, a[2] - a[0]) * Math.max(0, a[3] - a[1]);
            const areaB = Math.max(0, b[2] - b[0]) * Math.max(0, b[3] - b[1]);
            const union = areaA + areaB - inter;
            return union > 0 ? inter / union : 0;
        }

        function drawSkeleton(keypoints, scaleX, scaleY, color) {
            if (!Array.isArray(keypoints) || keypoints.length === 0) {
                return;
            }

            const pointByIndex = new Map();
            keypoints.forEach(point => {
                if (!point || typeof point.x !== 'number' || typeof point.y !== 'number') return;
                if (typeof point.conf === 'number' && point.conf < 0.25) return;
                pointByIndex.set(point.index, {
                    x: point.x * scaleX,
                    y: point.y * scaleY,
                    conf: point.conf,
                });
            });

            ctx.save();
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.globalAlpha = 0.58;
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.shadowColor = 'rgba(0,0,0,0.25)';
            ctx.shadowBlur = 2;

            SKELETON_EDGES.forEach(([from, to]) => {
                const a = pointByIndex.get(from);
                const b = pointByIndex.get(to);
                if (!a || !b) return;

                ctx.beginPath();
                ctx.lineWidth = 1.5;
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();
            });

            pointByIndex.forEach(point => {
                ctx.beginPath();
                ctx.arc(point.x, point.y, 2.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(17,24,39,0.65)';
                ctx.lineWidth = 0.75;
                ctx.stroke();
            });

            ctx.restore();
        }

        function clearCanvas() {
            const rect = canvas.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);
        }

        function writeLog(message, type = 'info') {
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            
            const logLine = document.createElement('div');
            logLine.className = 'log-line';

            let typeClass = 'log-info';
            if (type === 'warn') typeClass = 'log-warn';
            if (type === 'error') typeClass = 'log-error';
            if (type === 'detection') typeClass = 'log-detection';
            if (type === 'event') typeClass = 'log-event';

            logLine.innerHTML = `<span class="log-time">[${timeStr}]</span> <span class="${typeClass}">${message}</span>`;
            
            terminalLogs.appendChild(logLine);
            
            // 자동 스크롤 하단 고정 (최대 150라인 관리)
            if (terminalLogs.childNodes.length > 150) {
                terminalLogs.removeChild(terminalLogs.firstChild);
            }
            terminalLogs.scrollTop = terminalLogs.scrollHeight;
        }

        function clearLogs() {
            terminalLogs.innerHTML = '<div class="log-line"><span class="log-time">System</span> <span class="log-info">Logs cleared.</span></div>';
        }
    </script>
</body>
</html>
