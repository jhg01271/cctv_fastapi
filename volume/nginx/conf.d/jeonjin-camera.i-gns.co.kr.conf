server {
        listen 80;
        server_name jeonjin-camera.i-gns.co.kr;
        access_log off;

	root /usr/local/apache2/htdocs;
	index index.html;

        location / {
		proxy_pass http://frontend;
		proxy_set_header   Host $http_host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;    
        }

        location /com {
                proxy_pass http://backend;
		proxy_set_header   Host $http_host;
		proxy_set_header   X-Real-IP $remote_addr;
		proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;    
        }

        location /api {
                proxy_pass http://backend;
                proxy_set_header   Host $http_host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;    
        }

	location /cctv {
		proxy_pass http://ai_server:8000/cctv;
		client_max_body_size 200M;
		proxy_redirect		off;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
	}

	location /cameras {
		proxy_pass http://ai_server:8000/cameras;
		proxy_redirect		off;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
	}

	location /safety {
		proxy_pass http://ai_server:8000/safety;
		proxy_redirect		off;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}

	location /progress {
		proxy_pass http://ai_server:8000/progress;
		proxy_redirect		off;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
	}

	location /stream {
		rewrite ^(/stream)$ / break;
		proxy_pass http://mediamtx:8889/stream;
		client_max_body_size 200M;
		proxy_redirect		off;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header	X-Forwarded-Proto $scheme;
	} 

	location /file {
		alias /files;
	}

}

