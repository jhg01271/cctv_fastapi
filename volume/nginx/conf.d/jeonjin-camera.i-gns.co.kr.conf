# ###############################################
# Nginx 리버스 프록시 서버 설정
#
# * WebRTC Same-Origin 중계 경로 (/{CAMERA_ID}/) 및 기존 /stream 주소 리다이렉트 보강
# ###############################################
server {
        listen 80;
        server_name jeonjin-camera.i-gns.co.kr;
        access_log off;
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $ai_server_upstream ai_server:8000;
        set $backend_upstream backend:80;
        set $frontend_upstream frontend:80;

	root /usr/local/apache2/htdocs;
	index index.html;

	# MediaMTX WebRTC 원본 경로를 same-origin으로 직접 중계한다.
	# MediaMTX WHEP reader는 /CAM0001/whep/{session} 같은 후속 PATCH URL을
	# 만들기 때문에, /stream/ prefix를 붙이면 브라우저 세션 URL이 어긋날 수 있다.
	location ~ ^/CAM[0-9]+(?:/.*)?$ {
		proxy_pass http://mediamtx:8889;
		proxy_http_version 1.1;
		client_max_body_size 200M;
		proxy_hide_header Access-Control-Expose-Headers;
		add_header Access-Control-Expose-Headers "Accept-Post, Link, Location" always;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header	X-Forwarded-Proto $scheme;
		proxy_set_header	X-Forwarded-Host $http_host;
	}

        location / {
		proxy_pass http://$frontend_upstream$request_uri;
		proxy_set_header   Host $http_host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

	location ~ ^/(js|css)/ {
		proxy_pass http://$frontend_upstream$request_uri;
		proxy_set_header   Host $http_host;
		proxy_set_header   X-Real-IP $remote_addr;
		proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
		add_header Cache-Control "no-cache, must-revalidate" always;
	}

        location /com {
                proxy_pass http://$backend_upstream$request_uri;
		proxy_set_header   Host $http_host;
		proxy_set_header   X-Real-IP $remote_addr;
		proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api {
                proxy_pass http://$backend_upstream$request_uri;
                proxy_set_header   Host $http_host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

	location /grid {
		proxy_pass http://$ai_server_upstream$request_uri;
		client_max_body_size 200M;
		proxy_redirect		off;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
	}

	location /cctv {
		proxy_pass http://$ai_server_upstream$request_uri;
		client_max_body_size 200M;
		proxy_redirect		off;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
	}

	location /cameras {
		proxy_pass http://$ai_server_upstream$request_uri;
		proxy_redirect		off;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
	}

	location /safety {
		proxy_pass http://$ai_server_upstream$request_uri;
		proxy_redirect		off;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}

	location /progress {
		proxy_pass http://$ai_server_upstream$request_uri;
		proxy_redirect		off;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
	}

	# 이전 /stream/CAM0001/ 주소는 MediaMTX 원본 경로로 정규화한다.
	location ~ ^/stream/(CAM[0-9]+)(/.*)?$ {
		return 308 $scheme://$http_host/$1$2$is_args$args;
	}

	location = /stream {
		return 308 $scheme://$http_host/;
	}

	location /file {
		alias /files;
	}

}
