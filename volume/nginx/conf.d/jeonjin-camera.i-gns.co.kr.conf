server {
        listen 80;
        server_name jeonjin-camera.i-gns.co.kr;
        access_log off;
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $ai_server_upstream ai_server:8000;
        set $backend_upstream backend:80;
        set $frontend_upstream frontend:80;

	root /usr/local/apache2/htdocs;
	index index.html;

        location / {
		proxy_pass http://$frontend_upstream$request_uri;
		proxy_set_header   Host $http_host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /com {
                proxy_pass http://$backend_upstream$request_uri;
		proxy_set_header   Host $http_host;
		proxy_set_header   X-Real-IP $remote_addr;
		proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api {
                proxy_pass http://$backend_upstream$request_uri;
                proxy_set_header   Host $http_host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

	location /cctv {
		proxy_pass http://$ai_server_upstream$request_uri;
		client_max_body_size 200M;
		proxy_redirect		off;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
	}

	location /cameras {
		proxy_pass http://$ai_server_upstream$request_uri;
		proxy_redirect		off;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
	}

	location /safety {
		proxy_pass http://$ai_server_upstream$request_uri;
		proxy_redirect		off;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}

	location /progress {
		proxy_pass http://$ai_server_upstream$request_uri;
		proxy_redirect		off;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
	}

	location /stream {
		rewrite ^(/stream)$ / break;
		proxy_pass http://mediamtx:8889/stream;
		client_max_body_size 200M;
		proxy_redirect		off;
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header	X-Forwarded-Proto $scheme;
	} 

	location /file {
		alias /files;
	}

}
